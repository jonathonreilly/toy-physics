<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Extended Data Figure 1. Weak-field support theorems</title>
  <desc id="desc">Schematic collecting weak-field gravity corollaries, exact I3 equals zero, and exact CPT as compact supporting results on the retained discrete surface.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#355c7d"/>
    </marker>
    <style>
      .bg { fill: #f8f5ef; }
      .title { font: 700 28px Georgia, serif; fill: #1f2a44; }
      .label { font: 600 20px Helvetica, Arial, sans-serif; fill: #1f2a44; }
      .body { font: 16px Helvetica, Arial, sans-serif; fill: #243447; }
      .box { stroke: #355c7d; stroke-width: 2.5; rx: 16; ry: 16; }
      .core { fill: #e7f0f4; }
      .support { fill: #f1e8d8; }
      .exact { fill: #e5f1e8; }
      .arrow { stroke: #355c7d; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="760"/>
  <text class="title" x="600" y="46" text-anchor="middle">Extended Data Figure 1. Weak-Field Gravity Corollaries, Exact $I_3=0$, and Exact CPT</text>

  <rect class="box core" x="410" y="95" width="380" height="130"/>
  <text class="label" x="600" y="138" text-anchor="middle">Retained weak-field backbone</text>
  <text class="body" x="600" y="172" text-anchor="middle">Poisson self-consistency + lattice Green-function Newton law</text>
  <text class="body" x="600" y="200" text-anchor="middle">single discrete surface, exact audited operator family</text>

  <line class="arrow" x1="600" y1="225" x2="320" y2="310"/>
  <line class="arrow" x1="600" y1="225" x2="600" y2="310"/>
  <line class="arrow" x1="600" y1="225" x2="880" y2="310"/>

  <rect class="box support" x="120" y="320" width="320" height="190"/>
  <text class="label" x="280" y="362" text-anchor="middle">Weak-field corollaries</text>
  <text class="body" x="280" y="398" text-anchor="middle">WEP: universal $k$-independent deflection</text>
  <text class="body" x="280" y="426" text-anchor="middle">time dilation on the retained Poisson/Newton surface</text>
  <text class="body" x="280" y="462" text-anchor="middle">same weak-field action, no separate gravity import</text>

  <rect class="box exact" x="460" y="320" width="280" height="190"/>
  <text class="label" x="600" y="362" text-anchor="middle">Exact $I_3=0$</text>
  <text class="body" x="600" y="398" text-anchor="middle">no third-order interference on the Hilbert surface</text>
  <text class="body" x="600" y="432" text-anchor="middle">exact consistency theorem, not a numerical fit</text>

  <rect class="box exact" x="760" y="320" width="320" height="190"/>
  <text class="label" x="920" y="362" text-anchor="middle">Exact CPT</text>
  <text class="body" x="920" y="398" text-anchor="middle">free staggered lattice is exactly CPT invariant</text>
  <text class="body" x="920" y="432" text-anchor="middle">supports the same gauge/matter backbone used in the paper</text>

  <rect class="box core" x="260" y="570" width="680" height="110"/>
  <text class="label" x="600" y="610" text-anchor="middle">Role in the manuscript</text>
  <text class="body" x="600" y="642" text-anchor="middle">These results strengthen the retained discrete backbone without widening the main paper claim.</text>
</svg>
