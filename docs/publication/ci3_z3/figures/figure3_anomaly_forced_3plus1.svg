<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">Anomaly-forced 3+1</title>
  <desc id="desc">Flowchart from left-handed anomaly to SU(2)-singlet completion, chirality, single-clock evolution, and the unique 3+1 result.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#355c7d"/>
    </marker>
    <style>
      .bg { fill: #f8f5ef; }
      .title { font: 700 30px Georgia, serif; fill: #1f2a44; }
      .label { font: 600 19px Helvetica, Arial, sans-serif; fill: #1f2a44; }
      .body { font: 16px Helvetica, Arial, sans-serif; fill: #243447; }
      .box { stroke: #355c7d; stroke-width: 2.5; rx: 16; ry: 16; }
      .step1 { fill: #e7f0f4; }
      .step2 { fill: #f2ead7; }
      .step3 { fill: #e4f1e8; }
      .step4 { fill: #f5e7e4; }
      .step5 { fill: #ede6f3; }
      .arrow { stroke: #355c7d; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .small { font: 15px Helvetica, Arial, sans-serif; fill: #243447; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="780"/>
  <text class="title" x="600" y="50" text-anchor="middle">Figure 3. Anomaly-forced 3+1</text>

  <rect class="box step1" x="80" y="110" width="250" height="185"/>
  <text class="label" x="205" y="150" text-anchor="middle">Left-handed starting point</text>
  <text class="body" x="205" y="190" text-anchor="middle">(2,3)_(+1/3) + (2,1)_(-1)</text>
  <text class="body" x="205" y="220" text-anchor="middle">Tr[Y] = 0, Tr[SU(2)^2 Y] = 0</text>
  <text class="body" x="205" y="248" text-anchor="middle">Tr[Y^3] != 0, Tr[SU(3)^2 Y] != 0</text>
  <text class="body" x="205" y="276" text-anchor="middle">gauge theory inconsistent as-is</text>

  <rect class="box step2" x="475" y="110" width="250" height="185"/>
  <text class="label" x="600" y="150" text-anchor="middle">Anomaly cancellation</text>
  <text class="body" x="600" y="190" text-anchor="middle">requires SU(2)-singlet right-handed</text>
  <text class="body" x="600" y="218" text-anchor="middle">completion</text>
  <text class="body" x="600" y="248" text-anchor="middle">u_R, d_R, e_R, nu_R</text>
  <text class="body" x="600" y="276" text-anchor="middle">Standard-Model branch selected</text>

  <rect class="box step3" x="870" y="110" width="250" height="185"/>
  <text class="label" x="995" y="150" text-anchor="middle">Chirality requirement</text>
  <text class="body" x="995" y="190" text-anchor="middle">gamma_5 must anticommute with all</text>
  <text class="body" x="995" y="218" text-anchor="middle">Dirac generators</text>
  <text class="body" x="995" y="248" text-anchor="middle">therefore d_s + d_t must be even</text>
  <text class="body" x="995" y="276" text-anchor="middle">with d_s = 3, so d_t is odd</text>

  <rect class="box step4" x="285" y="430" width="300" height="185"/>
  <text class="label" x="435" y="470" text-anchor="middle">Single-clock evolution</text>
  <text class="body" x="435" y="510" text-anchor="middle">one strongly continuous U(t)</text>
  <text class="body" x="435" y="538" text-anchor="middle">one codimension-1 initial surface</text>
  <text class="body" x="435" y="566" text-anchor="middle">arbitrary local initial data</text>
  <text class="body" x="435" y="594" text-anchor="middle">d_t &gt; 1 gives ultrahyperbolic / multi-time</text>

  <rect class="box step5" x="685" y="430" width="260" height="185"/>
  <text class="label" x="815" y="470" text-anchor="middle">Unique outcome</text>
  <text class="body" x="815" y="510" text-anchor="middle">d_t is odd from chirality</text>
  <text class="body" x="815" y="538" text-anchor="middle">d_t &gt; 1 excluded by single-clock</text>
  <text class="body" x="815" y="566" text-anchor="middle">codimension-1 evolution</text>
  <text class="body" x="815" y="602" text-anchor="middle">therefore d_t = 1 and spacetime is 3+1</text>

  <line class="arrow" x1="330" y1="202" x2="475" y2="202"/>
  <line class="arrow" x1="725" y1="202" x2="870" y2="202"/>
  <line class="arrow" x1="995" y1="295" x2="995" y2="370"/>
  <line class="arrow" x1="995" y1="370" x2="585" y2="370"/>
  <line class="arrow" x1="585" y1="370" x2="585" y2="430"/>
  <line class="arrow" x1="585" y1="522" x2="685" y2="522"/>

  <text class="small" x="600" y="700" text-anchor="middle">Load-bearing logic: anomaly cancellation forces opposite-chirality singlets; chirality forces even total dimension;</text>
  <text class="small" x="600" y="724" text-anchor="middle">single-clock codimension-1 evolution excludes multi-time continuations; only 3+1 survives.</text>
</svg>
