<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Three-generation matter structure</title>
  <desc id="desc">Schematic of the exact orbit algebra 8 equals 1 plus 1 plus 3 plus 3 and its physical-lattice interpretation.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#355c7d"/>
    </marker>
    <style>
      .bg { fill: #f8f5ef; }
      .title { font: 700 30px Georgia, serif; fill: #1f2a44; }
      .label { font: 600 20px Helvetica, Arial, sans-serif; fill: #1f2a44; }
      .body { font: 16px Helvetica, Arial, sans-serif; fill: #243447; }
      .groupA { fill: #e7f0f4; stroke: #355c7d; stroke-width: 2.5; }
      .groupB { fill: #f2ead7; stroke: #355c7d; stroke-width: 2.5; }
      .groupC { fill: #e4f1e8; stroke: #355c7d; stroke-width: 2.5; }
      .groupD { fill: #f1e4ef; stroke: #355c7d; stroke-width: 2.5; }
      .ring { fill: none; stroke: #355c7d; stroke-width: 2; stroke-dasharray: 7 6; }
      .arrow { stroke: #355c7d; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .box { fill: #ffffff; stroke: #355c7d; stroke-width: 2.5; rx: 16; ry: 16; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760"/>
  <text class="title" x="600" y="50" text-anchor="middle">Figure 4. Three-generation Matter Structure</text>

  <circle class="ring" cx="285" cy="320" r="165"/>
  <circle class="groupA" cx="285" cy="155" r="42"/>
  <circle class="groupB" cx="402" cy="202" r="42"/>
  <circle class="groupC" cx="450" cy="320" r="42"/>
  <circle class="groupC" cx="402" cy="438" r="42"/>
  <circle class="groupD" cx="285" cy="485" r="42"/>
  <circle class="groupD" cx="168" cy="438" r="42"/>
  <circle class="groupB" cx="120" cy="320" r="42"/>
  <circle class="groupA" cx="168" cy="202" r="42"/>

  <text class="label" x="285" y="88" text-anchor="middle">Exact orbit algebra</text>
  <text class="label" x="285" y="327" text-anchor="middle">8 = 1 + 1 + 3 + 3</text>

  <text class="body" x="285" y="161" text-anchor="middle">1</text>
  <text class="body" x="168" y="208" text-anchor="middle">1</text>
  <text class="body" x="402" y="208" text-anchor="middle">3</text>
  <text class="body" x="450" y="326" text-anchor="middle">3</text>
  <text class="body" x="402" y="444" text-anchor="middle">3</text>
  <text class="body" x="285" y="491" text-anchor="middle">3</text>
  <text class="body" x="168" y="444" text-anchor="middle">3</text>
  <text class="body" x="120" y="326" text-anchor="middle">3</text>

  <line class="arrow" x1="470" y1="320" x2="640" y2="230"/>
  <line class="arrow" x1="470" y1="320" x2="640" y2="410"/>

  <rect class="box" x="660" y="140" width="430" height="170"/>
  <text class="label" x="875" y="180" text-anchor="middle">Physical-lattice interpretation</text>
  <text class="body" x="875" y="220" text-anchor="middle">Triplet sectors are retained as physical species structure,</text>
  <text class="body" x="875" y="248" text-anchor="middle">not divided away as disposable regulator taste copies.</text>
  <text class="body" x="875" y="276" text-anchor="middle">The safe claim is three-generation structure, not flavor numerics.</text>

  <rect class="box" x="660" y="350" width="430" height="190"/>
  <text class="label" x="875" y="392" text-anchor="middle">Boundary conditions on the claim</text>
  <text class="body" x="875" y="432" text-anchor="middle">No rooting in Hamiltonian Cl(3) on Z^3.</text>
  <text class="body" x="875" y="460" text-anchor="middle">Chirality comes only in the full framework through anomaly-forced time</text>
  <text class="body" x="875" y="488" text-anchor="middle">and one-generation closure.</text>
  <text class="body" x="875" y="516" text-anchor="middle">This is not presented as a conventional Nielsen-Ninomiya loophole.</text>

  <text class="body" x="600" y="650" text-anchor="middle">The exact orbit structure fixes the qualitative generation count. Detailed mass hierarchy and flavor transport remain separate quantitative questions.</text>
</svg>
