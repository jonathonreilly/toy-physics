    on its own; Z3 acts on the lepton mass-tower selector slice, not the
    quark-bilinear EW doublet structure. Demoted to support component of B.
  - Route C (dimensional argument from g_2² = 1/4): the running surface
    M_Pl → v is the bounded SU(2) staircase residual from cycle 15;
    re-attacking this is corollary churn.
  - Route D (Majorana null-space → EWSB): cycle 06 Majorana operator is
    a SU(2)_L-singlet Majorana mass; it BREAKS lepton number, not
    SU(2)_L × U(1)_Y. Different structural target.
  - Route E (Non-Higgs EWSB with no fundamental scalar): too broad for
    single cycle; would replicate technicolor without new framework input.

