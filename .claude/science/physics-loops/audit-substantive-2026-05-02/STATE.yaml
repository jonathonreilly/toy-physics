    note_changes: docs/SELF_GRAVITY_BACKREACTION_CLOSURE_NOTE.md
    runner_changes: scripts/poisson_self_gravity_loop_v3.py
    claim_type_change: none (stays no_go)
  dimensional_gravity_table:
