    decision: NARROW
    summary: |
      "Convention-free light bending fixes c=1" claim was wrong: PPN gamma=1
      holds for any c>0 under Phi=c*f/2. Reused PR #245 narrowing: removed
      bogus deflection ratio table; rewrote conclusion as convention-locked
      (c is fixed by naming f<->Phi identification + Poisson source
      normalization). Both c=1 (framework) and c=2 (textbook Newtonian) match
      Schwarzschild and PPN gamma=1; difference is convention not physics.
    note_changes: docs/ACTION_NORMALIZATION_NOTE.md
    runner_changes: scripts/frontier_action_normalization.py
    claim_type_change: stays bounded_theorem (now honestly bounded)
  monopole_derived_note:
    decision: NARROW
    summary: |
      Note advertised M_mono ~ 0.80 M_Pl from placeholder alpha_inv(M_Pl)~40.
      Live runner uses one-loop SM RG running giving alpha_inv(M_Pl)~72.1 and
      computes M_mono = 1.43 M_Pl. Reused PR #245 reconciliation: updated note
      headline + runner synthesis label to 1.43 M_Pl. Sensitivity table
      preserved (M_mono in [0.59, 1.21] M_Pl across alpha_inv in [30, 60]);
      order-of-magnitude prediction M ~ M_Pl is robust across the plausible
      window. Note language now bounded (RG-window-dependent), so next audit
      should re-classify positive_theorem -> bounded_theorem.
    note_changes: docs/MONOPOLE_DERIVED_NOTE.md
    runner_changes: scripts/frontier_monopole_derived.py
    claim_type_change: pending audit reclassification (positive_theorem -> bounded_theorem)
  lorentz_violation_derived_note:
    decision: FIX
    summary: |
      Runner used (2/a^2) sin^2(pa/2) as kinetic eigenvalue but its printed
      Taylor expansion claimed the (4/a^2) result. Mathematical inconsistency:
      the half-normalized (2/a^2) form gives leading p^2/2, not p^2. Updated
      runner to use the standard (4/a^2) sin^2(pa/2) = (2/a^2)(1-cos(pa))
      Laplacian eigenvalue, which matches the note's Step 2 derivation.
      Numerical residual (lattice - p^4 expansion) at pa=0.1256 dropped from
      0.788 to 1.09e-6 — sub-microscopic, consistent with the note's claim of
      "<0.02% for pa<0.5". Note's "non-standard normalization" footnote
      replaced with audit-fix annotation.
    note_changes: docs/LORENTZ_VIOLATION_DERIVED_NOTE.md
    runner_changes: scripts/frontier_lorentz_violation.py
    claim_type_change: none (stays bounded_theorem)
  self_gravity_backreaction_closure_note:
