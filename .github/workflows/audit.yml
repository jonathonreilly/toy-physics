name: audit-lane

# Run the mechanical audit pipeline on PRs that touch audit-relevant files,
# plus a nightly cron pass on main. Public repo, free Actions minutes, but
# we tighten triggers anyway because the repo has very high commit volume
# (hundreds of pushes/day) and noisy workflow history is its own cost.
#
# Drift-catching coverage:
#   - PRs: caught before merge (PASS gate, warning surface, no auto-commit)
#   - main: caught within 24 hours by the nightly cron (auto-commits refresh)
#   - manual: workflow_dispatch for urgent ad-hoc runs
#
# We deliberately do NOT trigger on every push to main, because:
#   (a) the auto-commit-back-to-main creates a feedback loop concern, and
#   (b) at hundreds of pushes/day the run count would be UI-noise excessive.
# The nightly cron + the PR-pre-merge gate together still guarantee main
# never drifts more than 24 hours and never merges drift through a PR.
#
# This workflow does NOT perform audits. Audit verdicts are minted only by
# the configured independent auditor via apply_audit.py.

on:
  pull_request:
    paths:
      - 'docs/**/*.md'
      - 'docs/audit/scripts/**'
      - 'logs/runner-cache/**'
      - 'scripts/**/*.py'
      - 'scripts/**/*.sh'
      - 'docs/audit/templates/audit_workflow.yml'
      - '.github/workflows/audit.yml'
  schedule:
    - cron: "0 6 * * *"   # nightly 06:00 UTC pass on main
  workflow_dispatch:        # manual ad-hoc

permissions:
  contents: write          # required for auto-commit on cron runs

concurrency:
  # PR runs of the same branch supersede each other (only run latest);
  # cron runs use a different group so they never get cancelled by PRs.
  group: audit-lane-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  audit_pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0    # full history so the citation graph builder can resolve all paths
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Report missing dependency-edge repair candidates (PR only)
        if: github.event_name == 'pull_request'
        run: python3 docs/audit/scripts/repair_missing_dependency_edges.py

      - name: Repair missing dependency edges (cron/manual only)
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        run: python3 docs/audit/scripts/repair_missing_dependency_edges.py --apply

      - name: Check runner cache freshness (PR only, diff-scoped)
        if: github.event_name == 'pull_request'
        run: |
          # Every runner under scripts/ must have a SHA-pinned cache at
          # logs/runner-cache/<stem>.txt whose header sha matches the
          # current runner. The audit lane consumes this cache; stale
          # caches mean the auditor sees outdated evidence.
          #
          # PRs check ONLY runners changed in this branch vs the base
          # ref, so an unrelated PR doesn't inherit pre-existing drift
          # on main. The nightly cron step below catches main-branch
          # drift separately. (--pr-diff escalates to the full ledger
          # if a cache-invalidator helper changed.)
          base="origin/${{ github.base_ref }}"
          if ! python3 scripts/precompute_audit_runners.py --pr-diff "$base" --check-only; then
            echo
            echo "::error::Runner cache is stale for one or more runners CHANGED IN THIS PR."
            echo "::error::Refresh locally with:"
            echo "::error::  python3 scripts/precompute_audit_runners.py --pr-diff $base"
            echo "::error::then commit logs/runner-cache/."
            exit 1
          fi

      - name: Report main-branch cache drift (cron/manual, warning only)
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        run: |
          # Full-ledger freshness check on main. Emits a warning if
          # drift exists; the cron's refresh step below will fix it.
          if ! python3 scripts/precompute_audit_runners.py --all --check-only; then
            echo "::warning::Pre-existing cache drift on main; the nightly refresh below should clear it."
          fi

      - name: Run audit pipeline
        run: bash docs/audit/scripts/run_pipeline.sh

      - name: Check pipeline diff (PR runs only)
        if: github.event_name == 'pull_request'
        run: |
          git status --short docs/audit docs/publication/ci3_z3
          if [[ -n "$(git status --porcelain docs/audit docs/publication/ci3_z3)" ]]; then
            echo
            echo "::warning::Audit-data files changed during pipeline run on this PR."
            echo "::warning::This usually means notes were edited without re-running"
            echo "::warning::bash docs/audit/scripts/run_pipeline.sh and committing the result."
            echo "::warning::Run the pipeline locally and commit the regenerated files."
            git diff --stat docs/audit docs/publication/ci3_z3 || true
            exit 1
          fi

      - name: Commit refreshed ledger / queue (cron only)
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        run: |
          set -e
          git config user.name  "audit-bot"
          git config user.email "audit-bot@users.noreply.github.com"
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            msg="audit: nightly repair and pipeline refresh (automated) [skip ci]"
          else
            msg="audit: workflow_dispatch repair and pipeline refresh (automated) [skip ci]"
          fi

          commit_if_needed() {
            if [[ -z "$(git status --porcelain docs)" ]]; then
              echo "No audit-data changes; nothing to commit."
              return 1
            fi
            git add docs
            if git diff --cached --quiet; then
              echo "No audit-data changes after staging; nothing to commit."
              return 1
            fi
            git commit -m "$msg"
          }

          commit_if_needed || exit 0

          # Race-condition safety: main may have moved while the audit
          # pipeline generated docs. Generated JSON/Markdown is not safe to
          # rebase through conflicts, so refresh from the latest origin/main
          # and rerun the deterministic repair/pipeline before retrying.
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            if [[ "$attempt" == "3" ]]; then
              echo "Push failed after $attempt attempts; aborting auto-commit."
              exit 1
            fi
            echo "Push attempt $attempt failed; regenerating from latest origin/main..."
            git fetch origin main
            git reset --hard origin/main
            python3 docs/audit/scripts/repair_missing_dependency_edges.py --apply
            bash docs/audit/scripts/run_pipeline.sh
            commit_if_needed || exit 0
          done

      - name: Upload audit queue artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: audit-queue-${{ github.run_id }}
          path: |
            docs/audit/data/audit_queue.json
            docs/audit/data/effective_status_summary.json
            docs/audit/data/cycle_inventory.json
            docs/publication/ci3_z3/PUBLICATION_AUDIT_DIVERGENCE.md
          if-no-files-found: warn
          retention-days: 14

      - name: Print summary
        if: always()
        run: |
          if [ -f docs/audit/data/effective_status_summary.json ]; then
            python3 -c "
          import json
          s = json.load(open('docs/audit/data/effective_status_summary.json'))
          print('=== effective_status counts ===')
          for k, v in sorted(s.get('effective_status_counts', {}).items(), key=lambda x: -x[1]):
              print(f'  {k:50s} {v}')
          print()
          print(f'cycles detected: {s.get(\"cycles_detected\", \"?\")}')
          "
          fi
